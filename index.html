<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css"/>
<style>
  :root {
    /* Deep Space Backgrounds */
    --bg-base: #09090b;
    --surface-glass: rgba(24, 24, 27, 0.65);
    --surface-glass-hover: rgba(39, 39, 42, 0.8);
    --surface-solid: #18181b;
    
    /* Crisp Modern Typography */
    --text-primary: #f4f4f5;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
    
    /* Neon Accents (Indigo to Violet) */
    --accent-glow: rgba(99, 102, 241, 0.5);
    --text-accent: #818cf8;
    --text-danger: #f87171;
    
    /* Glass Borders */
    --border-subtle: rgba(255, 255, 255, 0.06);
    --border-strong: rgba(255, 255, 255, 0.12);
    --border-accent: rgba(99, 102, 241, 0.5);
    
    --radius-lg: 20px;
    --radius-md: 12px;
    --radius-sm: 8px;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    font-family: var(--font-sans); 
    background-color: var(--bg-base); 
    background-image: 
      radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.08), transparent 25%), 
      radial-gradient(circle at 85% 30%, rgba(124, 58, 237, 0.08), transparent 25%);
    background-attachment: fixed;
    color: var(--text-primary); 
    min-height: 100vh; 
    padding: 2rem 1rem; 
  }
  
  .container { max-width: 760px; margin: 0 auto; position: relative; z-index: 10; }
  
  /* Glassmorphism Panel Class */
  .glass-panel {
    background: var(--surface-glass);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .top-bar h1 { font-size: 24px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.5px; }
  .top-bar .date { font-size: 13px; color: var(--text-secondary); display:flex; align-items:center; gap: 10px;}
  
  .tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; background: rgba(0,0,0,0.3); padding: 6px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); display: inline-flex;}
  .tab { padding: 8px 16px; border-radius: var(--radius-sm); border: none; font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text-secondary); transition: all .3s ease; }
  
  /* Neon Active Tab */
  .tab.active { 
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); 
    color: #ffffff; 
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
  }
  .tab:hover:not(.active) { color: var(--text-primary); background: rgba(255,255,255,0.05); }
  
  .section { display: none; animation: fadeIn 0.4s ease forwards; }
  .section.visible { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .card { padding: 1.25rem 1.5rem; margin-bottom: 16px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .card-title { font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.2px;}
  
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat-card { background: rgba(0,0,0,0.2); border-radius: var(--radius-md); padding: 14px; border: 1px solid var(--border-subtle); }
  .stat-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;}
  .stat-val { font-size: 24px; font-weight: 600; color: var(--text-primary); }
  
  .habit-card { background: rgba(0,0,0,0.2); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 1rem 1.25rem; margin-bottom: 10px; transition: border-color 0.3s;}
  .habit-card:hover { border-color: var(--border-strong); }
  .habit-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .habit-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .streak-pill { font-size: 11px; color: #fff; background: rgba(99, 102, 241, 0.2); border: 1px solid rgba(99, 102, 241, 0.3); padding: 3px 8px; border-radius: 100px; font-weight: 500;}
  
  .dots { display: flex; gap: 6px; }
  .dot { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border-strong); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-muted); background: rgba(0,0,0,0.3); transition: all .3s cubic-bezier(0.4, 0, 0.2, 1); }
  
  /* Glowing Checkmarks */
  .dot.done { 
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); 
    border-color: transparent; 
    color: #ffffff; 
    box-shadow: 0 0 12px rgba(124, 58, 237, 0.4);
    font-weight: 600;
  }
  .dot:hover:not(.done) { background: rgba(255,255,255,0.05); border-color: var(--text-secondary); color: var(--text-secondary);}
  
  .goal-bar-wrap { margin: 12px 0 6px; background: rgba(0,0,0,0.4); border-radius: 100px; height: 6px; overflow: hidden; border: 1px solid var(--border-subtle); }
  .goal-bar { height: 100%; border-radius: 100px; transition: width .5s cubic-bezier(0.4, 0, 0.2, 1); }
  
  /* Modern Inputs */
  .add-row { display: flex; gap: 8px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
  .add-row input, .add-row select, .custom-input { 
    font-size: 13px; 
    padding: 10px 14px; 
    border: 1px solid var(--border-strong); 
    border-radius: var(--radius-md); 
    background: rgba(0,0,0,0.2); 
    color: var(--text-primary); 
    transition: all 0.3s;
    font-family: var(--font-sans);
  }
  .add-row input { flex: 1; min-width: 140px; }
  .add-row input:focus, .add-row select:focus, .custom-input:focus { 
    outline: none; 
    border-color: #6366f1; 
    background: rgba(0,0,0,0.4);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); 
  }
  
  /* Modern Gradient Buttons */
  .btn-primary { 
    padding: 10px 18px; 
    font-size: 13px; 
    font-weight: 600; 
    border-radius: var(--radius-md); 
    border: none; 
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); 
    cursor: pointer; 
    color: #ffffff; 
    white-space: nowrap; 
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
  }
  .btn-primary:hover { box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4); transform: translateY(-1px);}
  
  .sm-btn { padding: 8px 14px; font-size: 12px; font-weight: 500; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: rgba(255,255,255,0.03); cursor: pointer; color: var(--text-primary); transition: all 0.2s;}
  .sm-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3); }
  
  .del-btn { background: transparent; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 4px; transition: color 0.2s; border-radius: 4px;}
  .del-btn:hover { color: var(--text-danger); background: rgba(248, 113, 113, 0.1); }
  
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 13px; background: rgba(0,0,0,0.1); border-radius: var(--radius-md); border: 1px dashed var(--border-strong);}
  
  .todo-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid transparent; transition: background 0.2s; }
  .todo-item:hover { background: rgba(255,255,255,0.02); border-color: var(--border-subtle); }
  
  .todo-check { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: rgba(0,0,0,0.2); color: transparent; transition: all 0.2s; }
  .todo-check.done { 
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); 
    border-color: transparent; 
    color: #fff;
    box-shadow: 0 0 8px rgba(124, 58, 237, 0.3);
  }
  .todo-text { flex: 1; font-size: 14px; color: var(--text-primary); }
  .todo-text.done { text-decoration: line-through; color: var(--text-muted); }
  .todo-tag { font-size: 11px; padding: 3px 8px; border-radius: 100px; border: 1px solid var(--border-strong); color: var(--text-accent); background: rgba(99, 102, 241, 0.1); white-space: nowrap; font-weight: 500;}
  
  .week-day-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; padding: 14px 0 6px; border-bottom: 1px solid var(--border-subtle); margin-bottom: 4px; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; margin-top: 4px; }
  
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 12px; }
  .cal-head { font-size: 11px; color: var(--text-secondary); text-align: center; padding: 4px 0; font-weight: 600;}
  .cal-cell { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--text-secondary); background: rgba(0,0,0,0.2); border: 1px solid var(--border-subtle); transition: transform 0.2s; }
  
  .cal-cell.green { background: linear-gradient(135deg, rgba(79, 70, 229, 0.2) 0%, rgba(124, 58, 237, 0.2) 100%); border-color: rgba(99, 102, 241, 0.4); color: var(--text-accent); }
  .cal-cell.red { background: rgba(248, 113, 113, 0.05); border-color: rgba(248, 113, 113, 0.2); color: var(--text-danger); }
  .cal-cell.today { border-width: 1.5px; font-weight: 700; border-color: var(--text-primary); color: #fff;}
  .cal-cell.faded { opacity: .2; }
  
  .cal-month { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .cal-nav { background: rgba(255,255,255,0.05); border: 1px solid var(--border-subtle); cursor: pointer; color: var(--text-primary); font-size: 18px; padding: 4px 8px; border-radius: var(--radius-sm); transition: all 0.2s;}
  .cal-nav:hover { background: rgba(255,255,255,0.1); }
  
  .notes-sidebar { display: grid; grid-template-columns: 200px 1fr; gap: 16px; min-height: 400px; }
  @media (max-width: 600px) { .notes-sidebar { grid-template-columns: 1fr; } }
  .folder-list { display: flex; flex-direction: column; gap: 6px; }
  .folder-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; border-radius: var(--radius-sm); border: 1px solid transparent; cursor: pointer; font-size: 13px; color: var(--text-secondary); transition: all 0.2s;}
  
  .folder-item.active { background: rgba(255,255,255,0.05); border-color: var(--border-strong); color: var(--text-primary); font-weight: 500; }
  .folder-item:hover:not(.active) { background: rgba(255,255,255,0.02); border-color: var(--border-subtle);}
  .folder-count { font-size: 11px; background: rgba(0,0,0,0.3); padding: 2px 7px; border-radius: 100px; color: var(--text-muted); border: 1px solid var(--border-subtle);}
  
  .notes-panel { display: flex; flex-direction: column; gap: 10px; }
  .note-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .note-item { padding: 12px 14px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); cursor: pointer; background: rgba(0,0,0,0.2); transition: all 0.2s;}
  .note-item:hover { border-color: var(--border-strong); transform: translateY(-1px); }
  .note-item.active { border-color: var(--text-accent); background: rgba(99, 102, 241, 0.05); box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.2); }
  .note-item-title { font-size: 14px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .note-item-preview { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 4px; }
  
  .note-editor-wrap { display: flex; flex-direction: column; gap: 8px; }
  .note-title-inp { font-size: 18px; font-weight: 600; padding: 12px 14px; border-radius: var(--radius-md); border: 1px solid var(--border-strong); color: var(--text-primary); background: rgba(0,0,0,0.2); }
  .note-body-inp { font-size: 14px; padding: 14px; border-radius: var(--radius-md); border: 1px solid var(--border-strong); resize: vertical; min-height: 260px; line-height: 1.7; font-family: var(--font-sans); color: var(--text-primary); background: rgba(0,0,0,0.2); }
  .note-title-inp:focus, .note-body-inp:focus, .chat-input:focus { outline: none; border-color: var(--text-accent); background: rgba(0,0,0,0.4); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);}
  
  .chat-wrap { display: flex; flex-direction: column; height: 600px; padding: 0;}
  .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .msg { display: flex; gap: 12px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .msg-bubble { max-width: 82%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; color: var(--text-primary); background: rgba(255,255,255,0.05); border: 1px solid var(--border-subtle); white-space: pre-wrap; word-break: break-word; }
  .msg.user .msg-bubble { background: linear-gradient(135deg, rgba(79, 70, 229, 0.15) 0%, rgba(124, 58, 237, 0.15) 100%); border-color: rgba(99, 102, 241, 0.3); }
  .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; border: 1px solid var(--border-strong); }
  .msg.user .msg-avatar { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: #fff; border: none;}
  .msg.ai .msg-avatar { background: rgba(0,0,0,0.4); color: var(--text-secondary); }
  
  .chat-input-row { display: flex; gap: 10px; align-items: flex-end; padding: 16px; border-top: 1px solid var(--border-subtle); background: rgba(0,0,0,0.2); border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg);}
  .chat-input { flex: 1; font-size: 14px; padding: 12px 16px; border-radius: var(--radius-md); border: 1px solid var(--border-strong); resize: none; font-family: var(--font-sans); color: var(--text-primary); background: var(--bg-base); line-height: 1.5; max-height: 120px; }
  
  /* Pinterest style glowing background orbs for Auth screen */
  .glow-orb-1 { position: absolute; top: -10%; left: -10%; width: 50vw; height: 50vw; background: rgba(79, 70, 229, 0.15); filter: blur(120px); border-radius: 50%; z-index: 0; pointer-events: none;}
  .glow-orb-2 { position: absolute; bottom: -10%; right: -10%; width: 50vw; height: 50vw; background: rgba(124, 58, 237, 0.15); filter: blur(120px); border-radius: 50%; z-index: 0; pointer-events: none;}

  .typing-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: blink 1.4s infinite both; margin-right: 3px; }
  .typing-dot:nth-child(2) { animation-delay: .2s; }
  .typing-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
  .chat-welcome { text-align: center; padding: 3rem 2rem; color: var(--text-muted); font-size: 14px; }
  .chat-welcome i { font-size: 36px; display: block; margin-bottom: 12px; color: var(--text-accent); filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.4));}
  
  /* Google reCAPTCHA specific centering */
  .g-recaptcha > div { margin: 0 auto; }
</style>
</head>
<body>

<div id="auth-screen" style="display:flex; height:100vh; align-items:center; justify-content:center; position: relative; overflow: hidden;">
  
  <div class="glow-orb-1"></div>
  <div class="glow-orb-2"></div>

  <div class="card glass-panel" style="width: 100%; max-width: 400px; padding: 3rem 2.5rem; position: relative; z-index: 10;">
    <div style="text-align:center; margin-bottom: 2rem;">
      <i class="ti ti-hexagon-letter-a" style="font-size: 48px; color: var(--text-accent); margin-bottom: 8px; display: inline-block; filter: drop-shadow(0 0 12px rgba(99, 102, 241, 0.5));"></i>
      <h2 style="font-weight:600; font-size: 26px; letter-spacing: -0.5px;">Welcome Back</h2>
      <p style="font-size: 14px; color: var(--text-secondary); margin-top: 6px;">Sign in to access your dashboard</p>
    </div>

    <div style="display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px;">
      <input type="email" id="auth-email" placeholder="Email address" class="custom-input" style="width:100%;">
      <input type="password" id="auth-pass" placeholder="Password" class="custom-input" style="width:100%;">
    </div>
    
    <div class="g-recaptcha" data-sitekey="6Lez2DotAAAAAErGp2Wqdre16ljBXDMzWttYrXaO" data-theme="dark" style="margin-bottom: 20px; display: flex; justify-content: center; transform: scale(0.95); transform-origin: center;"></div>

    <button class="btn-primary" onclick="login()" style="width:100%; padding: 12px; margin-bottom:12px; font-size: 14px;">Log In</button>
    <button class="sm-btn" onclick="signup()" style="width:100%; padding: 12px; font-size: 14px; background: rgba(255,255,255,0.05);">Create Account</button>
    
    <div id="auth-error" style="color:var(--text-danger); font-size:13px; margin-top:16px; text-align:center; min-height: 20px;"></div>
  </div>
</div>

<div class="container" id="app-screen" style="display:none;">
  <div class="top-bar">
    <h1>Dashboard</h1>
    <span class="date">
      <span id="today-date"></span>
      <button class="sm-btn" onclick="logout()" style="margin-left: 12px;"><i class="ti ti-logout" style="margin-right:4px;"></i> Logout</button>
    </span>
  </div>
  
  <div class="tabs glass-panel" style="padding: 6px;">
    <button class="tab active" onclick="sw('habits')"><i class="ti ti-check"></i> Habits</button>
    <button class="tab" onclick="sw('todo')"><i class="ti ti-list-check"></i> To-do</button>
    <button class="tab" onclick="sw('calendar')"><i class="ti ti-calendar"></i> Calendar</button>
    <button class="tab" onclick="sw('notes')"><i class="ti ti-notes"></i> Notes</button>
    <button class="tab" onclick="sw('chat')"><i class="ti ti-message"></i> Ask Claude</button>
  </div>

  <div class="section visible" id="s-habits">
    <div class="stats-row" id="stats-row"></div>
    <div class="card glass-panel" id="goal-status" style="padding: 1rem 1.5rem;"></div>
    <div id="habits-list"></div>
    <div class="add-row glass-panel" style="padding: 14px; border-radius: var(--radius-md);">
      <input type="text" id="new-habit-name" placeholder="Name a new habit..."/>
      <select id="new-habit-icon">
        <option value="run">🏃 Exercise</option>
        <option value="book">📖 Read</option>
        <option value="droplet">💧 Hydrate</option>
        <option value="moon">🌙 Sleep</option>
        <option value="pray">🙏 Pray</option>
        <option value="pencil">✏️ Journal</option>
        <option value="chart">📈 Trade</option>
        <option value="star">⭐ Custom</option>
      </select>
      <button class="btn-primary" onclick="addHabit()" style="padding: 10px 16px;"><i class="ti ti-plus"></i> Add</button>
    </div>
  </div>

  <div class="section" id="s-todo">
    <div class="card glass-panel">
      <div class="card-header">
        <span class="card-title">Daily Focus</span>
        <span id="daily-count" style="font-size:12px;color:var(--text-secondary)"></span>
      </div>
      <div class="section-label">Pending Tasks</div>
      <div id="daily-pending" style="margin-bottom: 16px;"></div>
      <div class="add-row">
        <input type="text" id="new-daily" placeholder="What needs to be done today?" onkeydown="if(event.key==='Enter')addTodo('daily')"/>
        <select id="daily-tag-sel">
          <option value="">No tag</option>
          <option value="Work">Work</option>
          <option value="Personal">Personal</option>
          <option value="Trading">Trading</option>
          <option value="Business">Business</option>
          <option value="School">School</option>
        </select>
        <button class="sm-btn" onclick="addTodo('daily')"><i class="ti ti-plus"></i></button>
      </div>
      <div style="margin-top:24px; padding-top: 16px; border-top: 1px solid var(--border-subtle);">
        <div class="section-label">Completed</div>
        <div id="daily-done"></div>
      </div>
    </div>
    
    <div class="card glass-panel">
      <div class="card-header">
        <span class="card-title">Weekly Pipeline</span>
        <span id="weekly-count" style="font-size:12px;color:var(--text-secondary)"></span>
      </div>
      <div id="weekly-by-day"></div>
      <div class="add-row" style="margin-top:16px; padding-top:16px; border-top: 1px solid var(--border-subtle);">
        <input type="text" id="new-weekly" placeholder="Add upcoming task..." onkeydown="if(event.key==='Enter')addTodo('weekly')"/>
        <select id="weekly-day-sel">
          <option value="0">Sun</option><option value="1">Mon</option><option value="2">Tue</option>
          <option value="3">Wed</option><option value="4">Thu</option><option value="5">Fri</option><option value="6">Sat</option>
        </select>
        <select id="weekly-tag-sel">
          <option value="">Tag</option><option value="Work">Work</option><option value="Personal">Personal</option>
          <option value="Trading">Trading</option><option value="Business">Business</option><option value="School">School</option>
        </select>
        <button class="sm-btn" onclick="addTodo('weekly')"><i class="ti ti-plus"></i></button>
      </div>
    </div>
  </div>

  <div class="section" id="s-calendar">
    <div class="card glass-panel" style="padding: 1.5rem;">
      <div class="cal-month" style="margin-bottom: 16px;">
        <button class="cal-nav" onclick="calNav(-1)"><i class="ti ti-chevron-left"></i></button>
        <span style="font-size:16px;font-weight:600;color:var(--text-primary); letter-spacing: 0.5px;" id="cal-month-label"></span>
        <button class="cal-nav" onclick="calNav(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="cal-grid" id="cal-grid" style="margin-bottom: 20px;"></div>
      <div style="display: flex; gap: 16px; justify-content: center; padding-top: 16px; border-top: 1px solid var(--border-subtle);">
        <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);"><span style="width:12px;height:12px;border-radius:3px;background:linear-gradient(135deg, rgba(79, 70, 229, 0.4) 0%, rgba(124, 58, 237, 0.4) 100%); border:1px solid rgba(99, 102, 241, 0.5);"></span>Goal met</span>
        <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);"><span style="width:12px;height:12px;border-radius:3px;background:rgba(248, 113, 113, 0.1);border:1px solid rgba(248, 113, 113, 0.3);"></span>Below goal</span>
      </div>
    </div>
  </div>

  <div class="section" id="s-notes">
    <div class="card glass-panel">
      <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border-subtle);">
        <button class="btn-primary" onclick="newNote()"><i class="ti ti-plus" style="margin-right:4px;"></i> Create Note</button>
        <span class="save-ind" id="save-ind" style="margin-left: 10px;"></span>
        <button class="sm-btn" onclick="delNote()" id="del-note-btn" style="display:none;color:var(--text-danger);margin-left:auto; border-color:rgba(248, 113, 113, 0.3); background:rgba(248, 113, 113, 0.05);"><i class="ti ti-trash"></i> Delete</button>
      </div>
      
      <div class="notes-sidebar">
        <div>
          <div class="section-label">Folders</div>
          <div class="folder-list" id="folder-list" style="margin-bottom: 16px;"></div>
          <div class="folder-add-row">
            <input type="text" id="new-folder-inp" placeholder="New folder..."/>
            <button class="sm-btn" onclick="addFolder()"><i class="ti ti-plus"></i></button>
          </div>
        </div>
        <div class="notes-panel">
          <div class="note-list" id="note-list"></div>
          <div class="note-editor-wrap" id="note-editor" style="display:none">
            <select id="note-folder-sel" class="custom-input" style="font-size:12px;padding:8px 12px;margin-bottom:4px; max-width: 150px;" onchange="moveNote()"></select>
            <input class="note-title-inp" id="note-title" placeholder="Note title..." oninput="autoSave()"/>
            <textarea class="note-body-inp" id="note-body" placeholder="Start writing..." oninput="autoSave()"></textarea>
          </div>
          <div id="note-placeholder" style="display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:14px;border:1px dashed var(--border-strong);border-radius:var(--radius-md);min-height:300px; background: rgba(0,0,0,0.1);">Select or create a note</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section" id="s-chat">
    <div class="card glass-panel chat-wrap">
      <div class="chat-messages" id="chat-messages">
        <div class="chat-welcome">
          <i class="ti ti-message-2"></i>
          <strong style="font-size:16px;color:var(--text-primary);display:block;margin-bottom:8px">Claude Assistant</strong>
          <p style="font-size:13px;line-height:1.6;color:var(--text-secondary); max-width: 400px; margin: 0 auto;">Embedded intelligence. Ask for analysis on your habits, brainstorm ideas, or get workflow advice.</p>
        </div>
      </div>
      <div class="chat-input-row">
        <textarea class="chat-input" id="chat-input" placeholder="Message Claude..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-primary" id="send-btn" onclick="sendMsg()" style="padding: 12px; display: flex; align-items: center; justify-content: center;"><i class="ti ti-send" style="font-size: 16px;"></i></button>
      </div>
    </div>
  </div>
</div>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<script type="module">
// --- FIREBASE IMPORTS ---
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";

// ---> YOUR FIREBASE CONFIG KEYS <---
const firebaseConfig = {
  apiKey: "AIzaSyBYhP20XbfVUq1-29rZSBcMZKDTc6syiUY",
  authDomain: "ace-s-habits.firebaseapp.com",
  projectId: "ace-s-habits",
  storageBucket: "ace-s-habits.firebasestorage.app",
  messagingSenderId: "287581830382",
  appId: "1:287581830382:web:a181f590adfeddd369c7ff",
  measurementId: "G-9LHP3HJ6WK"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const analytics = getAnalytics(app);

const GOAL = 5;
const iconMap = { run:'🏃', book:'📖', droplet:'💧', moon:'🌙', pray:'🙏', pencil:'✏️', chart:'📈', star:'⭐' };
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// Cloud State Variables
let currentUser = null;
let habits = [];
let dailyTodos = {};
let weeklyTodos = [];
let notes = [];
let folders = ['General','Work','Ideas'];
let activeNote = null, activeFolder = 'General', calOffset = 0, saveTimer = null;
let chatHistory = [];

// --- AUTHENTICATION LOGIC ---
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user.uid;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    
    // Fetch user data from Cloud Firestore
    const docSnap = await getDoc(doc(db, 'users', currentUser));
    if (docSnap.exists()) {
      const data = docSnap.data();
      habits = data.habits || [];
      dailyTodos = data.dailyTodos || {};
      weeklyTodos = data.weeklyTodos || [];
      notes = data.notes || [];
      folders = data.folders || ['General','Work','Ideas'];
    }
    init();
  } else {
    currentUser = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }
});

async function login() {
  const e = document.getElementById('auth-email').value;
  const p = document.getElementById('auth-pass').value;
  try { await signInWithEmailAndPassword(auth, e, p); document.getElementById('auth-error').textContent = ""; } 
  catch(err) { document.getElementById('auth-error').textContent = err.message; }
}

async function signup() {
  // Check if the CAPTCHA is completed
  const recaptchaResponse = grecaptcha.getResponse();
  if (recaptchaResponse.length === 0) {
    document.getElementById('auth-error').textContent = "Please verify you are human.";
    return; // Stops the function here so no account is created
  }

  // Proceed with Firebase Sign Up
  const e = document.getElementById('auth-email').value;
  const p = document.getElementById('auth-pass').value;
  try { 
    await createUserWithEmailAndPassword(auth, e, p); 
    document.getElementById('auth-error').textContent = ""; 
  } 
  catch(err) { 
    document.getElementById('auth-error').textContent = err.message; 
  }
}

async function logout() {
  await signOut(auth);
}

// --- CLOUD SAVE FUNCTION ---
async function save() {
  if (!currentUser) return;
  try {
    await setDoc(doc(db, 'users', currentUser), {
      habits, dailyTodos, weeklyTodos, notes, folders
    }, { merge: true });
  } catch(e) {
    console.error("Error saving to cloud:", e);
  }
}

function dateKey(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function todayKey() { return dateKey(new Date()); }

function init() {
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  document.getElementById('weekly-day-sel').value = String(new Date().getDay());
  renderAll();
}

function renderAll() { renderHabits(); renderTodo(); renderCal(); renderNotes(); }

function sw(t) {
  ['habits','todo','calendar','notes','chat'].forEach((id, i) => {
    document.getElementById('s-'+id).classList.toggle('visible', id===t);
    document.querySelectorAll('.tab')[i].classList.toggle('active', id===t);
  });
}

function getWeekDays() {
  const d = new Date(), day = d.getDay();
  return Array.from({length:7}, (_, i) => { const dd = new Date(d); dd.setDate(d.getDate()-day+i); return dd.toLocaleDateString('en-US',{weekday:'short'}).slice(0,1); });
}

function calcStreak(h) {
  const checks = h.checks || []; let s = 0; const today = new Date().getDay();
  for (let i = today; i >= 0; i--) { if (checks[i]) s++; else break; } return s;
}

function todayDoneCount() {
  const dow = new Date().getDay();
  return habits.filter(h => (h.checks||[])[dow]).length;
}

function renderHabits() {
  const days = getWeekDays();
  const done = todayDoneCount(), total = habits.length;
  const pct = total ? Math.round((done/total)*100) : 0;
  const goalMet = done >= GOAL;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-label">Today</div><div class="stat-val">${done}/${Math.max(total,GOAL)}</div></div>
    <div class="stat-card"><div class="stat-label">Goal</div><div class="stat-val" style="color:${goalMet?'var(--text-accent)':'var(--text-primary)'}">5 habits</div></div>
    <div class="stat-card"><div class="stat-label">Rate</div><div class="stat-val">${pct}%</div></div>`;
  document.getElementById('goal-status').innerHTML = `
    <div style="margin-bottom:0">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:13px;color:var(--text-secondary)">Daily goal: <strong style="color:var(--text-primary)">${done} of ${GOAL}</strong></span>
        <span style="font-size:13px;font-weight:600;color:${goalMet?'var(--text-accent)':'var(--text-secondary)'}">${goalMet?'Goal achieved ✨':GOAL-done+' more to go'}</span>
      </div>
      <div class="goal-bar-wrap"><div class="goal-bar" style="width:${Math.min(100,Math.round((done/GOAL)*100))}%;background:${goalMet?'linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%)':'var(--text-muted)'}; box-shadow:${goalMet?'0 0 10px rgba(99, 102, 241, 0.5)':'none'}"></div></div>
    </div>`;
  const el = document.getElementById('habits-list');
  if (!habits.length) { el.innerHTML = '<div class="empty"><i class="ti ti-list-check" style="font-size:32px;display:block;margin-bottom:10px; color:var(--text-secondary);"></i>No habits yet — build your routine below</div>'; return; }
  el.innerHTML = habits.map((h, hi) => `
    <div class="habit-card">
      <div class="habit-header">
        <span class="habit-name">${iconMap[h.icon]||'⭐'} ${h.name}</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="streak-pill">${calcStreak(h)}d streak</span>
          <button class="del-btn" onclick="delHabit(${hi})"><i class="ti ti-trash"></i></button>
        </div>
      </div>
      <div class="dots">${days.map((d,di) => `<div class="dot${(h.checks||[])[di]?' done':''}" onclick="toggleDay(${hi},${di})" title="${d}">${d}</div>`).join('')}</div>
    </div>`).join('');
}

function toggleDay(hi, di) {
  if (!habits[hi].checks) habits[hi].checks = Array(7).fill(false);
  habits[hi].checks[di] = !habits[hi].checks[di];
  if (!habits[hi].history) habits[hi].history = {};
  if (di === new Date().getDay()) habits[hi].history[todayKey()] = habits[hi].checks[di];
  save(); renderHabits(); renderCal();
}

function addHabit() {
  const name = document.getElementById('new-habit-name').value.trim();
  const icon = document.getElementById('new-habit-icon').value;
  if (!name) return;
  habits.push({name, icon, checks: Array(7).fill(false), history: {}});
  document.getElementById('new-habit-name').value = '';
  save(); renderHabits();
}

function delHabit(i) { habits.splice(i,1); save(); renderHabits(); }

function renderTodo() {
  const tk = todayKey();
  const daily = dailyTodos[tk] || [];
  const pending = daily.filter(t => !t.done);
  const done = daily.filter(t => t.done);
  document.getElementById('daily-count').textContent = `${done.length}/${daily.length} done`;
  const pel = document.getElementById('daily-pending');
  if (!pending.length) { pel.innerHTML = '<div style="padding:16px 0;font-size:13px;color:var(--text-muted); text-align:center;">Inbox zero. No pending tasks.</div>'; }
  else { pel.innerHTML = pending.map(t => { const ri = daily.indexOf(t); return `<div class="todo-item">
    <div class="todo-check" onclick="checkDaily('${tk}',${ri})"></div>
    <span class="todo-text">${t.text}</span>
    ${t.tag?`<span class="todo-tag">${t.tag}</span>`:''}
    <button class="del-btn" onclick="delDaily('${tk}',${ri})"><i class="ti ti-x"></i></button>
  </div>`; }).join(''); }
  const del = document.getElementById('daily-done');
  if (!done.length) { del.innerHTML = '<div style="font-size:13px;color:var(--text-muted);padding:8px 0">Nothing completed yet.</div>'; }
  else { del.innerHTML = done.map(t => `<div class="todo-item">
    <div class="todo-check done"><i class="ti ti-check" style="font-size:12px; color:#fff;"></i></div>
    <span class="todo-text done">${t.text}</span>
    ${t.tag?`<span class="todo-tag" style="opacity:0.6">${t.tag}</span>`:''}
  </div>`).join(''); }
  renderWeekly();
}

function renderWeekly() {
  const now = new Date(), dow = now.getDay();
  const weekStart = new Date(now); weekStart.setDate(now.getDate()-dow);
  const wk = dateKey(weekStart);
  const thisWeek = weeklyTodos.filter(t => t.weekStart === wk);
  const pending = thisWeek.filter(t => !t.done);
  const done = thisWeek.filter(t => t.done);
  document.getElementById('weekly-count').textContent = `${done.length}/${thisWeek.length} done`;
  const byDay = {};
  pending.forEach(t => { if (!byDay[t.day]) byDay[t.day] = []; byDay[t.day].push(t); });
  let html = '';
  Array.from({length:7}, (_, i) => (dow+i)%7).forEach(d => {
    if (byDay[d] && byDay[d].length) {
      html += `<div class="week-day-label">${DAY_NAMES[d]}${d===dow?' — today':''}</div>`;
      byDay[d].forEach(t => { const idx = weeklyTodos.indexOf(t); html += `<div class="todo-item">
        <div class="todo-check" onclick="checkWeekly(${idx})"></div>
        <span class="todo-text">${t.text}</span>
        ${t.tag?`<span class="todo-tag">${t.tag}</span>`:''}
        <button class="del-btn" onclick="delWeekly(${idx})"><i class="ti ti-x"></i></button>
      </div>`; });
    }
  });
  if (!html && !done.length) html = '<div style="padding:16px 0;font-size:13px;color:var(--text-muted); text-align:center;">No upcoming tasks this week.</div>';
  if (done.length) {
    html += `<div class="week-day-label" style="margin-top:16px">Completed</div>`;
    done.forEach(t => { html += `<div class="todo-item" style="opacity:.6">
      <div class="todo-check done" style="cursor:default"><i class="ti ti-check" style="font-size:12px; color:#fff;"></i></div>
      <span class="todo-text done">${t.text}</span>
      ${t.tag?`<span class="todo-tag">${t.tag}</span>`:''}
    </div>`; });
  }
  document.getElementById('weekly-by-day').innerHTML = html;
}

function addTodo(type) {
  if (type === 'daily') {
    const text = document.getElementById('new-daily').value.trim();
    const tag = document.getElementById('daily-tag-sel').value;
    if (!text) return;
    const tk = todayKey();
    if (!dailyTodos[tk]) dailyTodos[tk] = [];
    dailyTodos[tk].push({text, tag, done: false});
    document.getElementById('new-daily').value = '';
  } else {
    const text = document.getElementById('new-weekly').value.trim();
    const tag = document.getElementById('weekly-tag-sel').value;
    const day = parseInt(document.getElementById('weekly-day-sel').value);
    if (!text) return;
    const now = new Date(), dow = now.getDay();
    const weekStart = new Date(now); weekStart.setDate(now.getDate()-dow);
    weeklyTodos.push({text, tag, day, done: false, weekStart: dateKey(weekStart)});
    document.getElementById('new-weekly').value = '';
  }
  save(); renderTodo();
}

function checkDaily(tk, idx) { dailyTodos[tk][idx].done = true; save(); renderTodo(); }
function delDaily(tk, idx) { dailyTodos[tk].splice(idx,1); save(); renderTodo(); }
function checkWeekly(idx) { weeklyTodos[idx].done = true; save(); renderWeekly(); }
function delWeekly(idx) { weeklyTodos.splice(idx,1); save(); renderWeekly(); }

function renderCal() {
  const now = new Date();
  const disp = new Date(now.getFullYear(), now.getMonth()+calOffset, 1);
  document.getElementById('cal-month-label').textContent = disp.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const year = disp.getFullYear(), month = disp.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const firstDow = new Date(year, month, 1).getDay();
  let html = ['S','M','T','W','T','F','S'].map(d => `<div class="cal-head">${d}</div>`).join('');
  for (let i = 0; i < firstDow; i++) html += `<div class="cal-cell faded"></div>`;
  const todayDate = now.getDate(), todayMonth = now.getMonth(), todayYear = now.getFullYear();
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d===todayDate && month===todayMonth && year===todayYear;
    const isFuture = new Date(year,month,d) > now && !isToday;
    const dk = `${year}-${month}-${d}`;
    let dayDone = isToday ? todayDoneCount() : -1;
    if (!isToday && !isFuture) {
      const count = habits.filter(h => h.history && h.history[dk]).length;
      dayDone = count > 0 ? count : (month < todayMonth || year < todayYear || (month===todayMonth && d < todayDate) ? 0 : -1);
    }
    let cls = 'cal-cell';
    if (isToday) cls += ' today';
    if (isFuture) cls += ' faded';
    else if (dayDone >= GOAL) cls += ' green';
    else if (dayDone >= 0 && dayDone < GOAL) cls += ' red';
    html += `<div class="${cls}">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}

function calNav(dir) { calOffset += dir; renderCal(); }

function renderFolders() {
  document.getElementById('folder-list').innerHTML = folders.map(f => `
    <div class="folder-item${f===activeFolder?' active':''}" onclick="setFolder('${f}')">
      <span><i class="ti ti-folder" style="font-size:14px;margin-right:8px; opacity:0.8;"></i>${f}</span>
      <span class="folder-count">${notes.filter(n=>n.folder===f).length}</span>
    </div>`).join('');
  const sel = document.getElementById('note-folder-sel');
  if (sel) sel.innerHTML = folders.map(f => `<option value="${f}"${f===activeFolder?'selected':''}>${f}</option>`).join('');
}

function setFolder(f) {
  activeFolder = f; activeNote = null;
  document.getElementById('note-editor').style.display = 'none';
  document.getElementById('note-placeholder').style.display = 'flex';
  document.getElementById('del-note-btn').style.display = 'none';
  renderNotes();
}

function addFolder() {
  const name = document.getElementById('new-folder-inp').value.trim();
  if (!name || folders.includes(name)) return;
  folders.push(name); document.getElementById('new-folder-inp').value = '';
  save(); renderNotes();
}

function renderNoteList() {
  const el = document.getElementById('note-list');
  const fn = notes.map((n,i) => ({n,i})).filter(({n}) => n.folder === activeFolder);
  if (!fn.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:10px;text-align:center;">Folder is empty.</div>'; return; }
  el.innerHTML = fn.map(({n,i}) => `
    <div class="note-item${activeNote===i?' active':''}" onclick="openNote(${i})">
      <div class="note-item-title">${n.title||'Untitled Note'}</div>
      <div class="note-item-preview">${(n.body||'').slice(0,40)||'No content...'}</div>
    </div>`).join('');
}

function renderNotes() { renderFolders(); renderNoteList(); }

function newNote() {
  notes.unshift({title:'', body:'', folder: activeFolder, created: Date.now()});
  activeNote = 0; save(); renderNotes(); openNote(0);
}

function openNote(i) {
  activeNote = i;
  document.getElementById('note-editor').style.display = 'flex';
  document.getElementById('note-placeholder').style.display = 'none';
  document.getElementById('del-note-btn').style.display = '';
  document.getElementById('note-title').value = notes[i].title || '';
  document.getElementById('note-body').value = notes[i].body || '';
  document.getElementById('note-folder-sel').value = notes[i].folder || activeFolder;
  document.getElementById('save-ind').textContent = '';
  renderNoteList();
}

function moveNote() {
  if (activeNote === null) return;
  notes[activeNote].folder = document.getElementById('note-folder-sel').value;
  save(); renderNotes();
}

function autoSave() {
  if (activeNote === null) return;
  notes[activeNote].title = document.getElementById('note-title').value;
  notes[activeNote].body = document.getElementById('note-body').value;
  document.getElementById('save-ind').innerHTML = '<i class="ti ti-loader-2" style="animation: spin 1s linear infinite;"></i> Saving...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { save(); renderNoteList(); renderFolders(); document.getElementById('save-ind').innerHTML = '<i class="ti ti-check"></i> Saved'; setTimeout(() => { document.getElementById('save-ind').textContent = ''; }, 1500); }, 600);
}

function delNote() {
  if (activeNote === null) return;
  notes.splice(activeNote, 1); activeNote = null;
  document.getElementById('note-editor').style.display = 'none';
  document.getElementById('note-placeholder').style.display = 'flex';
  document.getElementById('del-note-btn').style.display = 'none';
  save(); renderNotes();
}

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }

function buildContext() {
  const dow = new Date().getDay();
  const done = habits.filter(h => (h.checks||[])[dow]).map(h => h.name);
  const pending = (dailyTodos[todayKey()]||[]).filter(t => !t.done).map(t => t.text);
  return `User dashboard context — ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}. Habits done today: ${done.length ? done.join(', ') : 'none'}. Daily goal: ${GOAL}. Pending daily tasks: ${pending.length ? pending.join(', ') : 'none'}. Total habits: ${habits.length}. Total notes: ${notes.length}.`;
}

function appendMsg(role, text) {
  const msgs = document.getElementById('chat-messages');
  const welcome = msgs.querySelector('.chat-welcome');
  if (welcome) welcome.remove();
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
  div.innerHTML = `<div class="msg-avatar">${role==='user'?'<i class="ti ti-user"></i>':'<i class="ti ti-sparkles"></i>'}</div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-avatar"><i class="ti ti-sparkles"></i></div><div class="msg-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing-indicator'); if (t) t.remove(); }

async function sendMsg() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  appendMsg('user', text);
  chatHistory.push({role:'user', content: text});
  showTyping();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: buildContext() + '\n\nYou are Claude, a helpful assistant embedded in the user\'s personal dashboard. Be concise, warm, and practical. You have context about their habits and tasks — use it naturally when relevant.',
        messages: chatHistory
      })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.content && data.content[0] ? data.content[0].text : 'Sorry, something went wrong.';
    appendMsg('ai', reply);
    chatHistory.push({role:'assistant', content: reply});
  } catch(e) {
    removeTyping();
    appendMsg('ai', 'Something went wrong — please try again.');
  }
  document.getElementById('send-btn').disabled = false;
}
